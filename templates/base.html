<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>{% block title %}Mi página{% endblock %}</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #667aea, #4282ad);
    text-align: center;
    color: white;
}

.container {
    background: white;
    color: black;
    margin: 50px auto;
    padding: 30px;
    width: 60%;
    border-radius: 15px;
    box-shadow: 0px 10px 25px rgba(0,0,0,0.3);
}

img {
    border-radius: 50%;
    width: 150px;
    margin-bottom: 10px;
}

.btn {
    display: inline-block;
    padding: 10px 15px;
    margin: 10px;
    background: #25D366;
    color: white;
    text-decoration: none;
    border-radius: 5px;
    font-weight: bold;
}

.btn:hover {
    background: #1ebe5d;
}
</style>

</head>

<body>

<div class="container">
{% block content %}
{% endblock %}
</div>

</body>
</html>
